[tool.pytest.ini_options]
# Tests import app/db/... from the repository root regardless of how
# pytest is invoked (bare `pytest` does not add the CWD to sys.path).
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = ["adolar-android", "AdolarRadio", "hilfe"]

[tool.ruff.lint]
select = [
    "E4", "E7", "E9", # pycodestyle errors
    "F",              # pyflakes
    "I",              # import sorting
    "B",              # bugbear
    "UP",             # pyupgrade
    "S",              # security (bandit)
    "SIM",            # simplifications
]
ignore = [
    # Broad excepts around best-effort work (tag writes, background sync)
    # are intentional; failures are logged where it matters.
    "S110",
    # SQL statements are built with placeholders; identifiers interpolated
    # into f-strings come from fixed allowlists, not user input.
    "S608",
    # Compact one-line statements are established style in this codebase.
    "E701", "E702",
]

[tool.ruff.lint.per-file-ignores]
# Tests: asserts, hardcoded temp credentials, seeded random.Random for
# deterministic shuffle behavior, and env setup before importing app.
"tests/*" = ["S101", "S105", "S106", "S311", "E402"]
