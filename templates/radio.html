<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Adolar Radio</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:        #7F77DD;
      --accent-light:  color-mix(in srgb, #7F77DD 18%, #30302E);
      --accent-border: #AFA9EC;
      --bg-primary:    #30302E;
      --bg-secondary:  #3A3A38;
      --bg-tertiary:   #1E1E1C;
      --text-primary:  #ECECEC;
      --text-secondary:#9A9A96;
      --text-tertiary: #5C5C58;
      --border-subtle: #3E3E3C;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── Title bar ── */
    #titlebar {
      height: 36px;
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }
    #titlebar img { width: 18px; height: 18px; }
    #titlebar span {
      font-family: "Orbitron", sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--accent) 0%, #b8b4f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #titlebar-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-left: 4px;
    }

    /* ── Cover ── */
    #cover-wrap {
      width: 100%;
      flex: 1;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    #cover-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .cover-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: 700; color: #fff;
    }
    #cover-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(20,20,18,.9) 100%);
    }
    #track-info {
      position: absolute; bottom: 10px; left: 12px; right: 12px;
    }
    #track-title {
      font-size: 15px; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #track-artist {
      font-size: 12px; color: rgba(255,255,255,.7);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    #track-reason {
      display: none; margin-top: 3px; font-size: 10px; color: rgba(255,255,255,.82);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Status badge ── */
    #radio-badge {
      position: absolute; top: 10px; left: 12px;
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
      padding: 2px 8px; border-radius: 99px;
      display: none;
      -webkit-app-region: no-drag;
    }
    #radio-badge.visible { display: block; }
    #station-select {
      border: none;
      background: transparent;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      outline: none;
      cursor: pointer;
      max-width: 180px;
    }
    #station-select option {
      color: #ECECEC;
      background: #30302E;
    }

    /* ── Progress ── */
    #progress-wrap {
      padding: 8px 12px 4px;
      display: flex; align-items: center; gap: 6px;
      background: var(--bg-primary);
    }
    .time { font-size: 10px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
    #progress {
      flex: 1; accent-color: var(--accent); cursor: pointer; height: 3px;
    }

    /* ── Controls ── */
    #controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px 8px;
      background: var(--bg-primary);
      border-top: 0.5px solid var(--border-subtle);
      gap: 4px;
    }

    .ctrl {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); padding: 6px;
      border-radius: 6px; transition: color .1s, background .1s;
      display: flex; align-items: center; justify-content: center;
      -webkit-app-region: no-drag;
    }
    .ctrl:hover { color: var(--text-primary); background: var(--bg-secondary); }
    .ctrl i { font-size: 18px; }
    #btn-play i { font-size: 24px; color: var(--text-primary); }

    #btn-love { color: var(--text-tertiary); }
    #btn-love:hover { color: #e03e3e; }
    #btn-love.loved { color: #e03e3e; }

    #btn-bookmark { color: var(--text-tertiary); }
    #btn-bookmark:hover { color: var(--accent); }
    #btn-bookmark.bookmarked { color: var(--accent); }

    #user-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-tertiary);
      -webkit-app-region: no-drag;
    }
    #btn-radio-login {
      font-size: 11px; padding: 3px 8px;
      background: none; border: 0.5px solid var(--border-subtle);
      border-radius: 6px; color: var(--text-tertiary); cursor: pointer;
      -webkit-app-region: no-drag; transition: border-color .15s, color .15s;
    }
    #btn-radio-login:hover { border-color: var(--accent-border); color: var(--accent); }

    /* ── Volume ── */
    #volume-wrap {
      display: flex; align-items: center; gap: 5px;
      -webkit-app-region: no-drag;
    }
    #volume-wrap i { font-size: 14px; color: var(--text-tertiary); }
    #volume { width: 64px; accent-color: var(--accent); cursor: pointer; height: 3px; }

    /* ── Not playing ── */
    #not-playing {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text-tertiary);
      flex-direction: column; gap: 8px;
    }
    #not-playing i { font-size: 32px; }

    /* ── Loading spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }

    input[type=range] { -webkit-app-region: no-drag; }
    button { -webkit-app-region: no-drag; }
  </style>
</head>
<body>

<div id="titlebar">
  <img src="/static/logo.svg" alt="Adolar">
  <span>Adolar</span>
  <span id="titlebar-sub">Radio</span>
  <div id="user-badge">
    <span id="user-badge-name" style="display:none"></span>
    <a id="btn-radio-login" href="/login?next=/radio" style="display:none">Anmelden</a>
  </div>
  <button id="btn-settings" title="Einstellungen" onclick="openSettings()" style="
    background:none; border:none; cursor:pointer;
    color:#5C5C58; padding:4px; border-radius:4px;
    display:flex; align-items:center; -webkit-app-region:no-drag;
    transition:color .15s;">
    <i class="ti ti-settings" style="font-size:15px"></i>
  </button>
</div>

<div id="cover-wrap">
  <div id="cover-inner"></div>
  <div id="cover-overlay"></div>
  <div id="radio-badge" class="visible">● <select id="station-select"></select></div>
  <div id="track-info" style="display:none">
    <div id="track-title">—</div>
    <div id="track-artist"></div>
    <div id="track-reason"></div>
  </div>
  <div id="not-playing">
    <i class="ti ti-radio spinning"></i>
    Starte Radio…
  </div>
</div>

<div id="progress-wrap" style="display:none">
  <span class="time" id="time-cur">0:00</span>
  <input type="range" id="progress" min="0" max="100" value="0" step="0.1">
  <span class="time" id="time-dur">0:00</span>
</div>

<div id="controls">
  <button class="ctrl" id="btn-prev" title="Vorheriger Titel"><i class="ti ti-player-skip-back"></i></button>
  <button class="ctrl" id="btn-play" title="Play/Pause"><i class="ti ti-player-play"></i></button>
  <button class="ctrl" id="btn-next" title="Nächster Titel"><i class="ti ti-player-skip-forward"></i></button>
  <button class="ctrl" id="btn-bookmark" title="Zu Radio-Favoriten hinzufügen" style="display:none"><i class="ti ti-bookmark"></i></button>
  <button class="ctrl" id="btn-love" title="Bei Last.fm liken" style="display:none"><i class="ti ti-heart"></i></button>
  <div id="volume-wrap">
    <i class="ti ti-volume"></i>
    <input type="range" id="volume" min="0" max="1" step="0.02" value="0.8">
  </div>
</div>

<audio id="audio"></audio>
<audio id="audio-b"></audio>

<script>
const API = "";

function fmt(s) {
  if (!s || isNaN(s)) return "0:00";
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, "0")}`;
}

function initials(name) {
  if (!name) return "♫";
  return name.trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join("");
}

function artistColor(name) {
  let h = 0;
  for (const c of (name || "?")) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return `hsl(${h % 360}, 55%, 40%)`;
}

function escHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ── Audio ─────────────────────────────────────────────────
const audioA = document.getElementById("audio");
const audioB = document.getElementById("audio-b");
let audio = audioA;   // mutable "active" reference — swapped on each crossfade
audioA.volume = 0.8;

const CF_PRELOAD = 25;
const CF_OUT     = 12;
const CF_IN      =  8;

const radio = { queue: [], playedIds: [], shuffleSession: null, cfTimer: null, cfActive: false, session: 0, stationId: 1, stationName: "Adolar Radio", station: null, tracksSinceJingle: 0 };

let _adolar4u = { collecting: false };
const a4uTelemetry = {
  sessionId: (globalThis.crypto?.randomUUID?.() || `${Date.now()}-${Math.random()}`),
  sequence: 0,
  trackId: null,
  source: "radio",
};

let currentTrack  = null;
let _scrobbled    = false;
let _playCounted  = false;
const lfm = { connected: false, lovedCache: new Map() };

function isJingle(track) {
  return Boolean(track && (track.type === "jingle" || track.is_jingle));
}

function stationJingleEvery() {
  return Number(radio.station?.jingle_every_tracks || 0);
}

function stationHasJingle() {
  return Boolean(
    radio.station &&
    radio.station.has_jingle &&
    radio.station.jingle_enabled &&
    stationJingleEvery() > 0
  );
}

function jingleDueAfterCurrent() {
  return stationHasJingle() && !isJingle(currentTrack) &&
    radio.tracksSinceJingle + 1 >= stationJingleEvery();
}

function makeJingleItem() {
  return {
    id: `jingle-${radio.stationId}`,
    type: "jingle",
    is_jingle: true,
    title: radio.stationName || "Adolar Radio",
    artist: "Station-ID",
    has_cover: false,
    duration: 0,
  };
}

function markCurrentPlayed() {
  if (!currentTrack || isJingle(currentTrack)) return;
  radio.playedIds.push(currentTrack.id);
  radio.tracksSinceJingle++;
  if (radio.playedIds.length > 100) radio.playedIds = radio.playedIds.slice(-100);
}

function a4uSource() {
  return radio.station?.engine === "adolar4u" ? "adolar4u" : "radio";
}

function sendA4UEvent(trackId, eventType, details = {}, beacon = false) {
  if (!_adolar4u.collecting || !trackId || String(trackId).startsWith("jingle-")) return;
  const payload = {
    event_type: eventType,
    source: details.source || a4uTelemetry.source,
    reason: details.reason || null,
    position_seconds: Number(details.position || 0),
    duration_seconds: Number(details.duration || 0),
    session_id: a4uTelemetry.sessionId,
    client_event_id: `${a4uTelemetry.sessionId}:${++a4uTelemetry.sequence}:${eventType}`,
  };
  const url = `${API}/api/adolar4u/events/${trackId}`;
  if (beacon && navigator.sendBeacon) {
    navigator.sendBeacon(url, new Blob([JSON.stringify(payload)], {type: "application/json"}));
  } else {
    fetch(url, {method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload), keepalive: true}).catch(() => {});
  }
}

function startA4UTrack(track) {
  if (!_adolar4u.collecting || !track || isJingle(track)) return;
  a4uTelemetry.trackId = track.id;
  a4uTelemetry.source = a4uSource();
  sendA4UEvent(track.id, "started", {
    source: a4uTelemetry.source, duration: Number(track.duration || 0),
  });
}

function finishA4UTrack(reason = "track_change", forceCompleted = false, beacon = false) {
  if (!a4uTelemetry.trackId) return;
  const duration = Number(audio.duration || currentTrack?.duration || 0);
  const position = Math.min(Number(audio.currentTime || 0), duration || Infinity);
  const ratio = duration > 0 ? position / duration : 0;
  const completed = forceCompleted || ratio >= .9;
  sendA4UEvent(a4uTelemetry.trackId, completed ? "completed" : "skipped", {
    source: a4uTelemetry.source,
    reason: completed ? "ended" : reason,
    position, duration,
  }, beacon);
  a4uTelemetry.trackId = null;
}

// ── Radio queue ───────────────────────────────────────────
async function loadQueue(count, exclude = []) {
  const p = new URLSearchParams({ count });
  exclude.forEach(id => p.append("exclude", id));
  if (radio.shuffleSession) p.set("shuffle_session", radio.shuffleSession);
  try {
    const res = await fetch(`${API}/api/radio-stations/${radio.stationId || 1}/tracks?${p}`);
    radio.shuffleSession = res.headers.get("X-Shuffle-Session") || radio.shuffleSession;
    return await res.json();
  } catch { return []; }
}

async function startRadio() {
  finishA4UTrack("stop");
  radio.queue = [];
  radio.playedIds = [];
  radio.shuffleSession = null;
  radio.tracksSinceJingle = 0;
  currentTrack = null;
  radio.session = (radio.session || 0) + 1;
  const initial = await loadQueue(5);
  if (!initial.length) return;

  radio.queue = initial;
  const mySession = radio.session;

  playTrack(radio.queue.shift());

  loadQueue(20, initial.map(t => t.id)).then(more => {
    if (radio.session !== mySession) return;
    radio.queue.push(...more);
  });
}

async function loadStations(preserveCurrent = false) {
  const select = document.getElementById("station-select");
  try {
    const previousId = preserveCurrent ? String(radio.stationId || "") : "";
    const r = await fetch(`${API}/api/radio-stations`);
    const stations = await r.json();
    select.innerHTML = stations.map(st => `<option value="${st.id}">${escHtml(st.name)}</option>`).join("");
    const first = stations[0] || { id: 1, name: "Adolar Radio" };
    const selected = stations.find(s => String(s.id) === previousId) || first;
    radio.stationId = selected.id;
    radio.stationName = selected.name;
    radio.station = selected;
    select.value = String(selected.id);
    select.onchange = () => {
      const st = stations.find(s => String(s.id) === select.value);
      radio.stationId = st?.id || Number(select.value) || 1;
      radio.stationName = st?.name || "Adolar Radio";
      radio.station = st || null;
      startRadio();
    };
  } catch {
    select.innerHTML = `<option value="1">Adolar Radio</option>`;
  }
}

async function radioNext(fromCrossfade = false) {
  if (!fromCrossfade && jingleDueAfterCurrent()) {
    markCurrentPlayed();
    radio.tracksSinceJingle = 0;
    playJingle();
    return;
  }

  if (!radio.queue.length) {
    const more = await loadQueue(20, radio.playedIds.slice(-100));
    radio.queue.push(...more);
  }
  if (!radio.queue.length) return;

  if (radio.queue.length <= 5) {
    const mySession = radio.session;
    loadQueue(20, radio.playedIds.slice(-100)).then(more => {
      if (radio.session !== mySession) return;
      radio.queue.push(...more);
    });
  }

  const track = radio.queue.shift();
  if (fromCrossfade) {
    // audio is already playing the new track — just update metadata
    markCurrentPlayed();
    currentTrack = track;
    _scrobbled   = false;
    _playCounted = false;
    updateUI(track);
    startA4UTrack(track);
    if (lfm.connected) {
      lfmCheckLoved(track).then(loved => setLoved(loved));
      fetch(`${API}/api/lastfm/nowplaying`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ artist: track.artist, title: track.title }),
      }).catch(() => {});
    }
  } else {
    playTrack(track);
  }
}

// ── Playback ──────────────────────────────────────────────
function playTrack(track) {
  if (!track) return;
  finishA4UTrack("track_change");
  markCurrentPlayed();
  currentTrack  = track;
  _scrobbled    = false;
  _playCounted  = false;

  radio.cfActive = false;
  cancelAnimationFrame(radio.cfTimer);
  const inactiveEl = getInactive();
  inactiveEl.pause(); inactiveEl.removeAttribute("src"); inactiveEl.load();

  updateUI(track);
  audio.src = `${API}/api/stream/${track.id}`;
  audio.play().catch(() => {});
  startA4UTrack(track);

  if (lfm.connected) {
    lfmCheckLoved(track).then(loved => setLoved(loved));
    fetch(`${API}/api/lastfm/nowplaying`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ artist: track.artist, title: track.title, duration: track.duration }),
    }).catch(() => {});
  }
}

function playJingle() {
  currentTrack = makeJingleItem();
  _scrobbled = true;
  _playCounted = true;
  radio.cfActive = false;
  cancelAnimationFrame(radio.cfTimer);
  const inactiveEl = getInactive();
  inactiveEl.pause(); inactiveEl.removeAttribute("src"); inactiveEl.load();
  updateUI(currentTrack);
  audio.src = `${API}/api/radio-stations/${radio.stationId}/jingle`;
  audio.play().catch(() => {});
}

function updateUI(track) {
  document.getElementById("not-playing").style.display = "none";
  document.getElementById("track-info").style.display  = "";
  document.getElementById("progress-wrap").style.display = "";

  document.getElementById("track-title").textContent  = track.title  || "—";
  document.getElementById("track-artist").textContent =
    [track.artist, track.year].filter(Boolean).join(" · ");
  const reason = document.getElementById("track-reason");
  reason.textContent = track.adolar4u_reason || "";
  reason.style.display = track.adolar4u_reason ? "block" : "none";
  document.title = track.title ? `${track.title} – ${track.artist || ""}` : "Adolar Radio";

  updateBookmarkBtn(track);
  if (isJingle(track)) setLoved(false);

  const inner = document.getElementById("cover-inner");
  inner.innerHTML = "";
  if (track.has_cover) {
    const img = document.createElement("img");
    img.src = `${API}/api/cover/${track.cover_hash}?full=1`;
    img.onerror = () => { inner.innerHTML = ""; inner.appendChild(makePh(track)); };
    inner.appendChild(img);
  } else {
    inner.appendChild(makePh(track));
  }
}

function makePh(track) {
  const div = document.createElement("div");
  div.className = "cover-ph";
  div.style.background = artistColor(track.artist);
  div.textContent = initials(track.artist);
  return div;
}

function setPlayBtn(playing) {
  document.getElementById("btn-play").innerHTML = playing
    ? `<i class="ti ti-player-pause"></i>`
    : `<i class="ti ti-player-play"></i>`;
}

// ── Preload + Crossfade ───────────────────────────────────
function getInactive() { return audio === audioA ? audioB : audioA; }

function preloadNext() {
  const inactive = getInactive();
  if (!radio.queue.length || inactive.src) return;
  if (jingleDueAfterCurrent()) return;
  const next = radio.queue[0];
  inactive.src = `${API}/api/stream/${next.id}`;
  inactive.preload = "auto";
  inactive.load();
}

function startCrossfade() {
  if (radio.cfActive || !radio.queue.length) return;
  if (jingleDueAfterCurrent()) return;
  const inactive = getInactive();

  const doFade = () => {
    radio.cfActive = true;
    const dur = CF_IN * 1000;
    let start = performance.now();
    const volSlider = document.getElementById("volume");

    inactive.volume = 0;
    inactive.play().catch(() => {});

    // When the page is hidden, RAF pauses. Track hidden time and shift `start`
    // forward so elapsed doesn't jump when the page becomes visible again.
    let hiddenSince = null;
    const onVisibility = () => {
      if (document.hidden) {
        hiddenSince = performance.now();
      } else if (hiddenSince !== null) {
        start += performance.now() - hiddenSince;
        hiddenSince = null;
        radio.cfTimer = requestAnimationFrame(tick);
      }
    };
    document.addEventListener("visibilitychange", onVisibility);

    const tick = () => {
      if (document.hidden) return; // RAF resumed briefly — wait for visibilitychange
      const elapsed = performance.now() - start;
      const progress = Math.min(elapsed / dur, 1);
      const vol = volSlider.valueAsNumber;
      audio.volume    = Math.cos(progress * Math.PI / 2) * vol;
      inactive.volume = Math.sin(progress * Math.PI / 2) * vol;

      if (progress < 1) {
        radio.cfTimer = requestAnimationFrame(tick);
      } else {
        document.removeEventListener("visibilitychange", onVisibility);
        const old = audio;
        audio = inactive;
        audio.volume = vol;
        old.pause(); old.removeAttribute("src"); old.load();
        radio.cfActive = false;
        finishA4UTrack("ended", true);
        radioNext(true);
      }
    };
    radio.cfTimer = requestAnimationFrame(tick);
  };

  if (inactive.readyState >= 3) {
    doFade();
  } else {
    inactive.addEventListener("canplay", doFade, { once: true });
  }
}

// ── Audio events ──────────────────────────────────────────
function onPlay(e)  { if (e.target === audio) setPlayBtn(true); }
function onPause(e) { if (e.target === audio) setPlayBtn(false); }
function onEnded(e) {
  if (e.target === audio && !radio.cfActive) {
    finishA4UTrack("ended", true);
    radioNext();
  }
}
function onTimeUpdate(e) {
  if (e.target !== audio) return;
  const cur = audio.currentTime;
  const dur = audio.duration;
  if (!dur) return;

  document.getElementById("time-cur").textContent = fmt(cur);
  document.getElementById("time-dur").textContent = fmt(dur);
  document.getElementById("progress").value = (cur / dur) * 100;

  const left = dur - cur;
  const inactive = audio === audioA ? audioB : audioA;
  if (left <= CF_PRELOAD && !inactive.src) preloadNext();
  if (left <= CF_OUT)    startCrossfade();

  if (isJingle(currentTrack)) return;

  if (!_scrobbled && cur / dur >= 0.5) {
    _scrobbled = true;
    if (lfm.connected && currentTrack) {
      fetch(`${API}/api/lastfm/scrobble`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ artist: currentTrack.artist, title: currentTrack.title }),
      }).catch(() => {});
    }
  }

  if (!_playCounted && cur / dur >= 0.9) {
    _playCounted = true;
    if (currentTrack) {
      fetch(`${API}/api/track/${currentTrack.id}/played`, { method: "POST" }).catch(() => {});
    }
  }
}
for (const el of [audioA, audioB]) {
  el.addEventListener("play",       onPlay);
  el.addEventListener("pause",      onPause);
  el.addEventListener("ended",      onEnded);
  el.addEventListener("timeupdate", onTimeUpdate);
}

// ── Controls ──────────────────────────────────────────────
document.getElementById("btn-play").onclick = () => audio.paused ? audio.play() : audio.pause();
document.getElementById("btn-next").onclick = () => {
  finishA4UTrack("manual_next");
  radio.cfActive = false;
  cancelAnimationFrame(radio.cfTimer);
  const inactive = getInactive();
  inactive.pause(); inactive.removeAttribute("src"); inactive.load();
  audio.volume = document.getElementById("volume").valueAsNumber;
  radioNext();
};
window.addEventListener("pagehide", () => finishA4UTrack("stop", false, true));
document.getElementById("btn-prev").onclick = () => {
  if (audio.currentTime > 5) { audio.currentTime = 0; return; }
  if (radio.playedIds.length) {
    const prevId = radio.playedIds.pop();
    radio.queue.unshift(currentTrack);
    fetch(`${API}/api/search?q=&per_page=1&page=1`)
      .catch(() => {});
    // simple: just restart current if no prev available
    audio.currentTime = 0;
  }
};
document.getElementById("progress").oninput = e => {
  if (audio.duration) audio.currentTime = (e.target.value / 100) * audio.duration;
};
document.getElementById("volume").oninput = e => {
  audioA.volume = e.target.valueAsNumber;
  audioB.volume = e.target.valueAsNumber;
};

// ── Current user ──────────────────────────────────────────
let _radioUser = null;

async function initUser() {
  try {
    const r = await fetch(`${API}/api/me-optional`);
    _radioUser = await r.json();
  } catch { _radioUser = null; }

  const nameBadge  = document.getElementById("user-badge-name");
  const loginBtn   = document.getElementById("btn-radio-login");
  const bookmarkBtn = document.getElementById("btn-bookmark");

  if (_radioUser) {
    nameBadge.textContent = _radioUser.username;
    nameBadge.style.display = "inline";
    loginBtn.style.display  = "none";
    bookmarkBtn.style.display = "";
    try {
      const status = await fetch(`${API}/api/adolar4u/status`);
      if (status.ok) _adolar4u = await status.json();
    } catch { _adolar4u = { collecting: false }; }
  } else {
    loginBtn.style.display  = "inline";
    nameBadge.style.display = "none";
    bookmarkBtn.style.display = "none";
  }
}

// ── Bookmark ──────────────────────────────────────────────
let _bookmarkedIds = new Set();

document.getElementById("btn-bookmark").onclick = async () => {
  if (!currentTrack || isJingle(currentTrack) || !_radioUser) return;
  const btn = document.getElementById("btn-bookmark");
  try {
    await fetch(`${API}/api/radio/bookmark/${currentTrack.id}`, { method: "POST" });
    _bookmarkedIds.add(currentTrack.id);
    btn.classList.add("bookmarked");
    btn.innerHTML = `<i class="ti ti-bookmark-filled"></i>`;
    btn.title = "Bereits in Radio-Favoriten";
  } catch {}
};

function updateBookmarkBtn(track) {
  const btn = document.getElementById("btn-bookmark");
  if (!_radioUser || !track) return;
  if (isJingle(track)) {
    btn.classList.remove("bookmarked");
    btn.innerHTML = `<i class="ti ti-bookmark"></i>`;
    btn.title = "Jingles können nicht gespeichert werden";
    return;
  }
  const already = _bookmarkedIds.has(track.id);
  btn.classList.toggle("bookmarked", already);
  btn.innerHTML = already
    ? `<i class="ti ti-bookmark-filled"></i>`
    : `<i class="ti ti-bookmark"></i>`;
  btn.title = already ? "Bereits in Radio-Favoriten" : "Zu Radio-Favoriten hinzufügen";
}

// ── Last.fm ───────────────────────────────────────────────
async function lfmInit() {
  // Last.fm only shown to admin
  lfm.connected = false;
  document.getElementById("btn-love").style.display = "none";
  if (!_radioUser || _radioUser.role !== "admin") return;
  try {
    const res  = await fetch(`${API}/api/lastfm/status`);
    const data = await res.json();
    lfm.connected = data.connected;
    document.getElementById("btn-love").style.display = lfm.connected ? "" : "none";
  } catch { lfm.connected = false; }
}

async function lfmCheckLoved(track) {
  if (!lfm.connected || !track || isJingle(track)) return false;
  const key = `${track.artist}||${track.title}`;
  if (lfm.lovedCache.has(key)) return lfm.lovedCache.get(key);
  try {
    const p = new URLSearchParams({ artist: track.artist || "", title: track.title || "" });
    const res = await fetch(`${API}/api/lastfm/loved?${p}`);
    const data = await res.json();
    lfm.lovedCache.set(key, data.loved);
    return data.loved;
  } catch { return false; }
}

function setLoved(loved) {
  const btn = document.getElementById("btn-love");
  btn.classList.toggle("loved", loved);
  btn.title = loved ? "Nicht mehr mögen (Last.fm)" : "Bei Last.fm liken";
  btn.innerHTML = loved ? `<i class="ti ti-heart-filled"></i>` : `<i class="ti ti-heart"></i>`;
  if (currentTrack) {
    lfm.lovedCache.set(`${currentTrack.artist}||${currentTrack.title}`, loved);
  }
}

document.getElementById("btn-love").onclick = async () => {
  if (!lfm.connected || !currentTrack || isJingle(currentTrack)) return;
  const key = `${currentTrack.artist}||${currentTrack.title}`;
  const isLoved = lfm.lovedCache.get(key) || false;
  try {
    await fetch(`${API}/api/lastfm/love`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ artist: currentTrack.artist, title: currentTrack.title, action: isLoved ? "unlove" : "love" }),
    });
    setLoved(!isLoved);
  } catch {}
};

// ── Notify main window via BroadcastChannel ───────────────
const ch = new BroadcastChannel("musikarchiv-player");
audio.addEventListener("play",  () => ch.postMessage({ type: "playstate", playing: true }));
audio.addEventListener("pause", () => ch.postMessage({ type: "playstate", playing: false }));

// ── Settings (calls Python via pywebview) ─────────────────
function openSettings() {
  if (window.pywebview) {
    window.pywebview.api.open_settings();
  }
}

// ── Init ──────────────────────────────────────────────────
initUser().then(() => lfmInit()).then(() => loadStations()).then(() => startRadio());
</script>
